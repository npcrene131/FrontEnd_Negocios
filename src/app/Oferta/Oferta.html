<div class="container">
  <h1>OFERTAS</h1>
  <mat-card class="main-card">
    <mat-card-header>
      <mat-card-title>Gestión de Ofertas</mat-card-title>
      <mat-card-subtitle>Ingresa la información detallada de la oferta</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Producto ID</mat-label>
          <input matInput type="number" [(ngModel)]="newOferta.ProductoId" placeholder="Ej. 101">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Negocio ID</mat-label>
          <input matInput type="number" [(ngModel)]="newOferta.NegocioID" placeholder="Ej. 5">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Descuento (%)</mat-label>
          <input matInput type="number" [(ngModel)]="newOferta.Descuento" placeholder="Ej. 20">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Fecha Inicio</mat-label>
          <input matInput type="date" [(ngModel)]="newOferta.FechaInicio">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Fecha Final</mat-label>
          <input matInput type="date" [(ngModel)]="newOferta.FechaFinal">
        </mat-form-field>
      </div>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-stroked-button color="basic" (click)="resetForm()" *ngIf="isEditing">Cancelar</button>
      <button mat-raised-button color="primary" class="save-btn" (click)="saveOferta()">
        {{ isEditing ? 'Actualizar Oferta' : 'Registrar Oferta' }}
      </button>
    </mat-card-actions>
  </mat-card>

  <mat-card class="table-card">
    <div class="table-container">
      <table mat-table [dataSource]="ofertas" class="custom-table">

        <ng-container matColumnDef="OfertaId">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let o"> {{o.OfertaId}} </td>
        </ng-container>

        <ng-container matColumnDef="ProductoId">
          <th mat-header-cell *matHeaderCellDef> Producto </th>
          <td mat-cell *matCellDef="let o"> {{o.ProductoId}} </td>
        </ng-container>

        <ng-container matColumnDef="NegocioID">
          <th mat-header-cell *matHeaderCellDef> Negocio </th>
          <td mat-cell *matCellDef="let o"> {{o.NegocioID}} </td>
        </ng-container>

        <ng-container matColumnDef="Descuento">
          <th mat-header-cell *matHeaderCellDef> Descuento </th>
          <td mat-cell *matCellDef="let o"> {{o.Descuento}} % </td>
        </ng-container>

        <ng-container matColumnDef="FechaInicio">
          <th mat-header-cell *matHeaderCellDef> Inicio </th>
          <td mat-cell *matCellDef="let o"> {{o.FechaInicio | date}} </td>
        </ng-container>

        <ng-container matColumnDef="FechaFinal">
          <th mat-header-cell *matHeaderCellDef> Final </th>
          <td mat-cell *matCellDef="let o"> {{o.FechaFinal | date}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> </th>
          <td mat-cell *matCellDef="let o">
            <div class="action-buttons">
              <button mat-icon-button color="primary" (click)="editOferta(o)" title="Editar">
                <span>✏️</span>
              </button>
              <button mat-icon-button color="warn" (click)="deleteOferta(o.OfertaId)" title="Eliminar">
                <span>🗑️</span>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card>
</div>
